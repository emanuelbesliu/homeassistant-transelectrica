<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle - deep blue for energy/power grid -->
  <circle cx="128" cy="128" r="120" fill="#1A5276"/>

  <!-- Transmission tower / pylon - white silhouette -->
  <!-- Main vertical mast -->
  <rect x="122" y="38" width="12" height="170" rx="2" fill="white"/>

  <!-- Top crossarm -->
  <rect x="82" y="48" width="92" height="8" rx="3" fill="white"/>
  <!-- Top arm insulators -->
  <line x1="88" y1="56" x2="88" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="168" y1="56" x2="168" y2="72" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Middle crossarm -->
  <rect x="90" y="88" width="76" height="7" rx="3" fill="white"/>
  <!-- Middle arm insulators -->
  <line x1="96" y1="95" x2="96" y2="108" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="95" x2="160" y2="108" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Lower crossarm -->
  <rect x="98" y="124" width="60" height="6" rx="3" fill="white"/>

  <!-- Diagonal bracing (legs) -->
  <line x1="128" y1="145" x2="90" y2="210" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="128" y1="145" x2="166" y2="210" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Cross bracing -->
  <line x1="104" y1="175" x2="152" y2="175" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Ground base -->
  <line x1="82" y1="210" x2="174" y2="210" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Power lines going left/right from top insulators -->
  <path d="M 30 68 Q 60 78 88 68" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 168 68 Q 198 78 226 68" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Power lines from middle insulators -->
  <path d="M 38 104 Q 68 112 96 104" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 160 104 Q 190 112 218 104" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Small lightning bolt accent (energy symbol) - bottom right -->
  <polygon points="196,170 184,190 192,190 180,214 200,186 192,186 204,170" fill="white" opacity="0.6"/>
</svg>
